
# =================================================================
# Server Settings
# =================================================================
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true


# =================================================================
# Security and JWT Settings
# =================================================================
jwt:
  secret: ${JWT_SECRET}
  access-token-validity: 3600000       # 1h (3600000ms)
  refresh-token-validity: 1209600000   # 14day (1209600000ms)

# =================================================================
# Database Settings (MariaDB)
# =================================================================
spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      defer-datasource-initialization: true
      ddl-auto: create
    properties:
      hibernate:
        default_batch_fetch_size: 100
  sql:
    init:
      mode: always

# =================================================================
# Redis Settings (SSL Enabled)
# =================================================================
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true
      lettuce:
        extension:
          ssl:
            enabled: true

# =================================================================
# File Upload Settings
# =================================================================
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# =================================================================
# Mail Service Settings
# =================================================================
  mail:
    host: smtp.gmail.com
    port: 587
    username: buddyzzang11@gmail.com
    password: ${BUDDY_EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# =================================================================
# OAuth2 Client Settings (Google, Naver, Kakao)
# =================================================================
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email,profile
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: http://buddy-api.kro.kr/login/oauth2/code/naver
            authorization-grant-type: authorization_code
            scope: name,email,profile_image
            client-name: Naver
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: http://buddy-api.kro.kr/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: profile_nickname,account_email
            client-name: Kakao
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# =================================================================
# Custom OAuth2 Settings (appSocialLogin(RN))
# =================================================================

kakao:
  redirect-uri: https://buddy.com/oauth/callback
  admin-key: ${KAKAO_ADMIN_KEY}
google:
  redirect-uri: https://buddy.com/oauth/callback
  audiences: ${GOOGLE_AUDIENCES}

# =================================================================
# External API Settings (OpenAI, Cloudinary)
# =================================================================
openai:
  api:
    key: ${OPENAI_API_KEY}
    url: https://api.openai.com/v1/chat/completions

cloudinary:
  cloud-name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_KEY}
  api-secret: ${CLOUDINARY_SECRET}

# =================================================================
# Logging Configuration
# =================================================================
logging:
  level:
    root: INFO
    com.buddy.buddyapi: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Console Output Color
spring.output.ansi.enabled: ALWAYS