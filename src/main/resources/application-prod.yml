
# =================================================================
# Database Settings (MariaDB)
# =================================================================
spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}?characterEncoding=UTF-8&useUnicode=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    out-of-order: false
    target: 3

# =================================================================
# Logging Configuration
# =================================================================

logging:
  level:
    root: INFO
    com.buddy.buddyapi: INFO
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF

  file:
    name: /var/log/buddy/application.log

  logback:
    rollingpolicy:
      max-file-size: 10MB        # 파일 하나당 최대 50MB
      max-history: 7            # 30일치 보관
      total-size-cap: 100MB        # 전체 로그 최대 3GB
      file-name-pattern: /var/log/buddy/application.%d{yyyy-MM-dd}.%i.log